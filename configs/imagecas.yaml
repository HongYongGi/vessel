version: "1.0"

dataset:
  id: imagecas
  name: "ImageCAS"
  description: "ImageCAS - A large-scale dataset for coronary artery segmentation from computed tomography angiography (CTA) images."
  paper: "https://arxiv.org/abs/2211.01607"
  license: "CC-BY 4.0"
  tier: 1
  body_region: cardiac
  modality: CTA
  num_cases: 1000
  estimated_size_gb: 55.0

source:
  type: kaggle
  dataset: "xiaoweixumedicalai/imagecas"
  extract: zip

format:
  image_format: nifti
  label_format: nifti
  image_pattern: "images/*.nii.gz"
  label_pattern: "labels/*.nii.gz"

labels:
  type: binary
  num_classes: 1
  mapping:
    1: coronary_artery

preprocess:
  target_spacing: [0.5, 0.5, 0.5]
  intensity_window:
    center: 200.0
    width: 800.0
  crop_size: null
  normalize: minmax
